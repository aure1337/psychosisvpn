<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychosis VPN | admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background: #050000; color: #f0f6fc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 5, 5, 0.95); border: 1px solid rgba(255, 0, 0, 0.1); backdrop-filter: blur(20px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        input, select, textarea { background: #0d0202 !important; border: 1px solid #200505 !important; color: #ff8888 !important; outline: none; transition: 0.2s; }
        input:focus { border-color: #ff0000 !important; }
        .nav-btn { color: #401010; font-weight: 900; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .nav-btn.active { color: #fff; background: #900 !important; border-color: #f00; box-shadow: 0 0 30px rgba(150,0,0,0.4); }
        .sub-card { background: #0d0202; border: 1px solid #1a0505; border-radius: 2rem; padding: 1.5rem; transition: 0.3s; }
        .sub-card:hover { border-color: #601010; transform: translateY(-3px); }
        .badge { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; }
        .badge-base { background: #300; color: #f55; }
        .badge-white { background: #003; color: #55f; }
        .badge-both { background: #330; color: #ff5; }
        .tariff-container { background: #0d0202; border: 1px solid #200505; border-radius: 2rem; margin-bottom: 2rem; width: 100%; overflow: hidden; }
        .tariff-header { padding: 1.5rem 2rem; border-bottom: 1px solid #1a0505; display: flex; justify-content: space-between; items: center; }
        .srv-row { border-bottom: 1px solid #150202; padding: 1.2rem 2rem; transition: 0.2s; display: flex; flex-direction: column; gap: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 lg:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-16 gap-6">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center text-3xl font-black text-white italic shadow-lg">P</div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">Psychosis <span class="text-red-600">VPN</span></h1>
            </div>
            <nav class="flex gap-2 p-1 bg-[#0a0202] rounded-2xl border border-red-900/20">
                <div id="nav-create" class="nav-btn active px-8 py-4 rounded-xl text-[10px] uppercase tracking-widest">Выпуск</div>
                <div id="nav-subs" class="nav-btn px-8 py-4 rounded-xl text-[10px] uppercase tracking-widest">Подписки</div>
                <div id="nav-servers" class="nav-btn px-8 py-4 rounded-xl text-[10px] uppercase tracking-widest">Сервера</div>
            </nav>
        </header>

        <div id="tab-create" class="tab-content active">
            <div class="glass p-10 rounded-[3rem] border-t-2 border-red-600 max-w-4xl mx-auto shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                    <div class="space-y-1">
                        <label class="text-[9px] text-zinc-600 uppercase font-bold tracking-widest ml-2">Client Name</label>
                        <input type="text" id="p_internal" class="p-5 rounded-2xl font-bold w-full" placeholder="Напр: Вася (TG)">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] text-zinc-600 uppercase font-bold tracking-widest ml-2">Plan selection</label>
                        <select id="p_tariff" class="p-5 rounded-2xl font-bold text-sm w-full cursor-pointer">
                            <option value="base">📡 Впн</option>
                            <option value="white">🛡️ Белый список</option>
                            <option value="both">👑 Обход + Впн</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] text-zinc-600 uppercase font-bold tracking-widest ml-2">Expiry Date</label>
                        <input type="date" id="p_exp" class="p-5 rounded-2xl font-bold w-full">
                    </div>
                </div>
                <button onclick="createSubscription()" class="w-full mt-8 bg-red-700 hover:bg-red-600 p-6 rounded-3xl font-black text-xl text-white uppercase tracking-tighter transition-all">ВЫПУСТИТЬ КЛЮЧ</button>
                <div id="result_area" class="hidden mt-8 p-6 bg-red-950/20 rounded-2xl border border-red-600/20 flex items-center justify-between">
                    <span id="final_link" class="font-mono text-[10px] text-red-500 break-all"></span>
                    <button onclick="copyToClipboard(document.getElementById('final_link').innerText)" class="ml-4 bg-white/10 px-6 py-3 rounded-xl text-white hover:bg-red-600 transition-all text-xs uppercase font-black">Copy</button>
                </div>
            </div>
        </div>

        <div id="tab-subs" class="tab-content">
            <div id="subs_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab-servers" class="tab-content">
            <div class="glass p-8 rounded-[2.5rem] mb-12 flex flex-col md:flex-row gap-6 items-end sticky top-6 z-10 shadow-2xl">
                <div class="flex-grow w-full">
                    <textarea id="srv_vless" class="w-full h-20 p-4 rounded-2xl text-[10px] font-mono leading-relaxed" placeholder="vless://...#Название"></textarea>
                </div>
                <div class="w-full md:w-64">
                    <select id="srv_type" class="w-full p-5 rounded-xl font-bold text-xs uppercase cursor-pointer h-[60px]">
                        <option value="base">📡 Впн</option>
                        <option value="white">🛡️ Белый список</option>
                        <option value="both">👑 Обход + Впн</option>
                    </select>
                </div>
                <button onclick="addServer()" class="bg-white text-black font-black px-12 py-5 rounded-2xl text-[10px] uppercase hover:bg-red-600 hover:text-white transition-all h-[60px]">Добавить</button>
            </div>
            <div class="space-y-12">
                <div class="tariff-container shadow-2xl border-l-4 border-red-600" id="cat-base">
                    <div class="tariff-header bg-red-950/10">
                        <h2 class="font-black uppercase text-red-600 italic text-xs">📡 Впн Servers</h2>
                    </div>
                    <div id="list-base"></div>
                </div>
                <div class="tariff-container shadow-2xl border-l-4 border-blue-600" id="cat-white">
                    <div class="tariff-header bg-blue-950/10">
                        <h2 class="font-black uppercase text-blue-500 italic text-xs">🛡️ Белый список</h2>
                    </div>
                    <div id="list-white"></div>
                </div>
                <div class="tariff-container shadow-2xl border-l-4 border-yellow-600" id="cat-both">
                    <div class="tariff-header bg-yellow-950/10">
                        <h2 class="font-black uppercase text-yellow-500 italic text-xs">👑 Обход + Впн</h2>
                    </div>
                    <div id="list-both"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // НАВИГАЦИЯ
        const navMap = { 'nav-create': 'tab-create', 'nav-subs': 'tab-subs', 'nav-servers': 'tab-servers' };
        Object.keys(navMap).forEach(id => {
            document.getElementById(id).onclick = function() {
                Object.keys(navMap).forEach(k => {
                    document.getElementById(k).classList.remove('active');
                    document.getElementById(navMap[k]).classList.remove('active');
                });
                this.classList.add('active');
                document.getElementById(navMap[id]).classList.add('active');
                if(id === 'nav-subs') loadSubscriptions();
                if(id === 'nav-servers') loadServers();
            }
        });

        // ПОДПИСКИ С ЛИЧНЫМИ СЕРВЕРАМИ
        async function loadSubscriptions() {
            const res = await fetch('/api/manage_subs?action=list');
            const data = await res.json();
            document.getElementById('subs_container').innerHTML = data.map(sub => {
                const customLinks = (sub.custom_servers || '').split('\n').filter(l => l.includes('vless://'));
                const customHtml = customLinks.map((link, idx) => `
                    <div class="flex items-center justify-between bg-black/40 p-2 rounded-lg mt-1 border border-white/5">
                        <input type="text" value="${decodeURIComponent(link.split('#')[1] || 'Личный')}" 
                               onchange="renameCustom('${sub.id}', ${idx}, this.value)" 
                               class="bg-transparent border-none text-[9px] text-zinc-400 font-mono w-full">
                        <button onclick="deleteCustom('${sub.id}', ${idx})" class="text-red-900 px-2"><i class="fas fa-times"></i></button>
                    </div>
                `).join('');

                return `
                <div class="sub-card flex flex-col glass">
                    <div class="flex justify-between mb-4">
                        <span class="badge badge-${sub.tariff_type}">${sub.tariff_type}</span>
                        <button onclick="deleteSub('${sub.id}')" class="text-zinc-800 hover:text-red-600"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                    <input type="text" id="sub-name-${sub.id}" value="${sub.internal_name || ''}" class="bg-transparent border-none text-white font-black text-xl mb-4 p-0">
                    
                    <div class="p-3 bg-black/40 rounded-2xl border border-white/5">
                        <label class="text-[8px] text-zinc-600 font-black uppercase tracking-widest">Личные конфиги:</label>
                        <div id="custom-list-${sub.id}" class="mt-2">${customHtml}</div>
                        <button onclick="addCustom('${sub.id}')" class="w-full mt-3 border border-dashed border-zinc-800 py-2 rounded-lg text-[9px] font-bold text-zinc-600 hover:text-white transition-all">+ ДОБАВИТЬ VLESS</button>
                    </div>

                    <div class="mt-6 flex gap-2">
                        <button onclick="updateSubFull('${sub.id}')" class="flex-grow bg-red-700 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest">Сохранить</button>
                        <button onclick="copyToClipboard('${window.location.origin}/api/get_sub?id=${sub.id}')" class="px-4 bg-white/5 rounded-xl"><i class="fas fa-link text-zinc-500"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        async function updateSubFull(id) {
            const data = { internal_name: document.getElementById('sub-name-' + id).value };
            await fetch('/api/manage_subs', { method: 'POST', body: JSON.stringify({ action: 'update', id, data }) });
            alert('Данные сохранены');
            loadSubscriptions();
        }

        async function addCustom(id) {
            const url = prompt('Вставь VLESS ссылку:');
            if(!url) return;
            const res = await fetch('/api/manage_subs?action=list');
            const subs = await res.json();
            const sub = subs.find(s => s.id === id);
            const newList = (sub.custom_servers || '') + '\n' + url;
            await fetch('/api/manage_subs', { method: 'POST', body: JSON.stringify({ action: 'update', id, data: { custom_servers: newList.trim() } }) });
            loadSubscriptions();
        }

        async function deleteCustom(id, idx) {
            const res = await fetch('/api/manage_subs?action=list');
            const subs = await res.json();
            const sub = subs.find(s => s.id === id);
            let list = sub.custom_servers.split('\n').filter(l => l.trim());
            list.splice(idx, 1);
            await fetch('/api/manage_subs', { method: 'POST', body: JSON.stringify({ action: 'update', id, data: { custom_servers: list.join('\n') } }) });
            loadSubscriptions();
        }

        async function renameCustom(subId, idx, newName) {
            const res = await fetch('/api/manage_subs?action=list');
            const subs = await res.json();
            const sub = subs.find(s => s.id === subId);
            let list = sub.custom_servers.split('\n').filter(l => l.trim());
            let parts = list[idx].split('#');
            list[idx] = parts[0] + '#' + encodeURIComponent(newName);
            await fetch('/api/manage_subs', { method: 'POST', body: JSON.stringify({ action: 'update', id: subId, data: { custom_servers: list.join('\n') } }) });
        }

        // СЕРВЕРА С ПОРЯДКОМ
        async function loadServers() {
            const res = await fetch('/api/manage_servers?action=list');
            const data = await res.json();
            ['base', 'white', 'both'].forEach(type => {
                const list = document.getElementById('list-' + type);
                const filtered = data.filter(s => s.tariff_type === type);
                list.innerHTML = filtered.map(s => `
                    <div class="srv-row flex justify-between items-center gap-4">
                        <div class="flex-grow">
                            <input type="text" value="${s.name}" onchange="renameSrv('${s.id}', this.value)" class="bg-transparent border-none font-black text-sm text-white w-full p-0">
                            <div class="text-[8px] text-zinc-600 font-mono truncate w-64">${s.vless_url}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="moveSrv('${s.id}', 'up')" class="bg-white/5 p-2 rounded-lg text-zinc-500 hover:text-white"><i class="fas fa-arrow-up"></i></button>
                            <button onclick="moveSrv('${s.id}', 'down')" class="bg-white/5 p-2 rounded-lg text-zinc-500 hover:text-white"><i class="fas fa-arrow-down"></i></button>
                            <button onclick="deleteSrv('${s.id}')" class="text-zinc-800 hover:text-red-600 p-2"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>
                `).join('') || '<p class="p-10 text-center text-xs opacity-10 uppercase font-black">ПУСТО</p>';
            });
        }

        async function moveSrv(id, dir) {
            // Простое решение: меняем created_at сервера, чтобы он всплыл или утонул при сортировке
            const res = await fetch('/api/manage_servers?action=list');
            const servers = await res.json();
            const idx = servers.findIndex(s => s.id === id);
            if(dir === 'up' && idx > 0) {
                const srv = servers[idx];
                await fetch('/api/manage_servers?action=delete&id=' + srv.id);
                await fetch('/api/manage_servers', { method: 'POST', body: JSON.stringify({ action: 'add', url: srv.vless_url, name: srv.name, type: srv.tariff_type }) });
            }
            loadServers();
        }

        async function createSubscription() {
            const payload = { title: 'Psychosis VPN', internal: document.getElementById('p_internal').value, tariff: document.getElementById('p_tariff').value, exp: document.getElementById('p_exp').value };
            const res = await fetch('/api/add_sub', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.id) {
                document.getElementById('result_area').classList.remove('hidden');
                document.getElementById('final_link').innerText = window.location.origin + '/api/get_sub?id=' + data.id;
            }
        }

        async function addServer() {
            const raw = document.getElementById('srv_vless').value;
            let [url, name] = raw.split('#');
            if(!url) return alert('Ошибка! Вставь VLESS ссылку.');
            await fetch('/api/manage_servers', { method: 'POST', body: JSON.stringify({ action: 'add', url, name: decodeURIComponent(name || 'New Node'), type: document.getElementById('srv_type').value }) });
            document.getElementById('srv_vless').value = '';
            loadServers();
        }

        async function renameSrv(id, name) {
            await fetch('/api/manage_servers', { method: 'POST', body: JSON.stringify({ action: 'rename', id, name }) });
        }

        async function deleteSrv(id) { if(confirm('Удалить?')) { await fetch('/api/manage_servers?action=delete&id='+id); loadServers(); } }
        async function deleteSub(id) { if(confirm('Удалить юзера?')) { await fetch('/api/manage_subs?action=delete&id='+id); loadSubscriptions(); } }
        function copyToClipboard(t) { navigator.clipboard.writeText(t); alert('СКОПИРОВАНО'); }
        document.getElementById('p_exp').value = new Date(Date.now() + 2592000000).toISOString().split('T')[0];
    </script>
</body>
</html>
